<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Zink WebRTC</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: blob: data:;">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #111;
            color: white;
            font-family: Segoe UI, sans-serif;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #root {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: auto auto 1fr;
            gap: 8px;
            padding: 10px;
            box-sizing: border-box;
        }

        #status {
            font-size: 14px;
            color: #ddd;
        }

        video {
            width: 100%;
            max-height: 45vh;
            background: black;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <div id="root">
        <div>Zink WebRTC Media Layer</div>
        <div id="status">Initializing...</div>
        <div>
            <video id="localVideo" autoplay playsinline muted></video>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
